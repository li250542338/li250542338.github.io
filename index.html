<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李老板的博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .post {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .post-title {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 10px;
        }

        .post-meta {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .post-meta span {
            margin-right: 20px;
        }

        .post-content {
            font-size: 1.1em;
            color: #444;
        }

        .post-content h2 {
            color: #764ba2;
            margin: 30px 0 15px;
            font-size: 1.5em;
        }

        .post-content p {
            margin-bottom: 15px;
        }

        .post-content ul {
            margin: 15px 0;
            padding-left: 30px;
        }

        .post-content li {
            margin-bottom: 10px;
        }

        .post-content strong {
            color: #667eea;
        }

        .footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
            font-size: 0.9em;
        }

        .tags {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }
            .post {
                padding: 25px;
            }
            .post-title {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 李老板的博客</h1>
            <p>记录学习和生活的地方</p>
        </header>

        <article class="post">
            <h2 class="post-title">你好，世界！</h2>
            <div class="post-meta">
                <span>📅 2026年4月14日</span>
                <span>📁 生活</span>
            </div>
            <div class="post-content">
                <p>欢迎来到我的博客！</p>
                <p>这是我的第一篇博客文章。很高兴能在这里记录我的学习和生活。</p>

                <h2>为什么要写博客？</h2>
                <ul>
                    <li><strong>记录成长</strong> - 记录自己学习的点点滴滴</li>
                    <li><strong>分享知识</strong> - 希望能帮助到其他人</li>
                    <li><strong>锻炼写作</strong> - 提高表达能力</li>
                </ul>

                <h2>未来计划</h2>
                <ul>
                    <li>分享高中学习笔记</li>
                    <li>记录生活感悟</li>
                    <li>分享技术探索</li>
                </ul>

                <p>感谢你的阅读！我们下篇文章见。</p>
            </div>
            <div class="tags">
                <span class="tag">博客</span>
                <span class="tag">第一篇</span>
            </div>
        </article>

        <div class="footer">
            <p>© 2026 李老板的博客 | 部署在 GitHub Pages</p>
        </div>
    </div>
</body>
</html>
