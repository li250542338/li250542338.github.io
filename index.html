<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI爱好者李医生的博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🏥 AI爱好者李医生的博客</h1>
            <nav class="nav">
                <a href="#" class="nav-link active" data-page="home">首页</a>
                <a href="#" class="nav-link" data-category="英语">英语</a>
                <a href="#" class="nav-link" data-category="AI">AI</a>
                <a href="#" class="nav-link" data-category="医学">医学</a>
                <a href="#" class="nav-link" data-category="文化">文化</a>
                <a href="#" class="nav-link" data-page="search">🔍 搜索</a>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- 首页 -->
            <div id="homePage" class="page active">
                <div class="posts-list" id="postsList"></div>
            </div>

            <!-- 归档页 -->
            <div id="archivesPage" class="page">
                <h2 class="page-title">📅 文章归档</h2>
                <div id="archivesList"></div>
            </div>

            <!-- 标签页 -->
            <div id="tagsPage" class="page">
                <h2 class="page-title">🏷️ 标签云</h2>
                <div id="tagsCloud"></div>
                <div id="tagPosts"></div>
            </div>

            <!-- 搜索页 -->
            <div id="searchPage" class="page">
                <h2 class="page-title">🔍 搜索资料</h2>
                <div style="margin-bottom: 30px;">
                    <input type="text" id="searchInput" placeholder="输入关键词搜索，支持模糊匹配..." style="width: 100%; padding: 15px 20px; font-size: 1.1rem; border: 2px solid #e0e0e0; border-radius: 12px; outline: none; transition: border-color 0.3s;" />
                </div>
                <div id="searchResults"></div>
            </div>

            <!-- 文章详情页 -->
            <div id="postPage" class="page">
                <button class="back-btn" id="backBtn">← 返回首页</button>
                <article id="postContent"></article>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 AI爱好者李医生的博客 | 用心记录成长</p>
        </div>
    </footer>

    <script src="posts.js"></script>
    <script src="script.js"></script>
</body>
</html>
